version: '3.8'

services:
  storage:
    image: minio/minio
    container_name: travel_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: travel_api
    environment:
      - S3_ENDPOINT=${S3_ENDPOINT:-http://storage:9000}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-travel-photos}
    depends_on:
      storage:
        condition: service_healthy

  frontend:
    build: ./vite-project
    container_name: travel_ui
    depends_on:
      - backend

  gateway:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  minio_data: