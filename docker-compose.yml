version: '3.8'

services:
  storage:
    image: minio/minio
    container_name: travel_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build: ./backend
    container_name: travel_api
    ports:
      - "8000:8000"
    environment:
      - S3_ENDPOINT=http://storage:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=travel-photos
    depends_on:
      - storage

  frontend:
    build: ./vite-project
    container_name: travel_ui
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  minio_data: